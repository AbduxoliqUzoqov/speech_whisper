<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Uzbek - Real-time ASR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .settings {
            margin-bottom: 2rem;
            text-align: left;
        }

        .settings label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .settings input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #0f172a;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .settings input:focus {
            border-color: var(--primary);
        }

        .record-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 9999px;
            width: 80px;
            height: 80px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .record-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
            transition: transform 0.2s;
        }

        .record-btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        .record-btn.recording {
            background-color: var(--danger);
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        .record-btn.recording svg {
            transform: scale(1.1);
        }

        @keyframes pulse {
            to {
                box-shadow: 0 0 0 30px rgba(239, 68, 68, 0);
            }
        }

        .status {
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            min-height: 24px;
        }

        .result-box {
            background-color: #0f172a;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            min-height: 120px;
            text-align: left;
            position: relative;
        }

        .result-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .result-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-main);
            word-wrap: break-word;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>O'zbek Whisper</h1>
        <p class="subtitle">Sun'iy intellekt yordamida nutqni matnga aylantirish</p>

        <div class="settings">
            <label for="apiUrl">Cloudflare API manzili (URL):</label>
            <input type="text" id="apiUrl" placeholder="Masalan: https://xxxx.trycloudflare.com" autocomplete="off">
        </div>

        <button id="recordBtn" class="record-btn" aria-label="Yozishni boshlash">
            <!-- Microphone Icon -->
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.39-.9.88 0 2.71-2.14 4.93-4.85 4.99-2.85.06-5.16-2.28-5.16-5.12 0-.49-.39-.88-.88-.88-.49 0-.88.39-.88.88 0 3.32 2.58 6.05 5.84 6.36V20c0 .55.45 1 1 1s1-.45 1-1v-1.74c3.25-.32 5.82-3.04 5.82-6.38 0-.49-.39-.88-.88-.88z"/>
            </svg>
        </button>

        <div class="status" id="statusText">Mikrofonni bosib gapiring</div>

        <div class="result-box">
            <div class="result-title">Natija</div>
            <div class="loader" id="loader"></div>
            <div class="result-text" id="resultText">Tarjima bu yerda ko'rinadi...</div>
        </div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('statusText');
        const resultText = document.getElementById('resultText');
        const apiUrlInput = document.getElementById('apiUrl');
        const loader = document.getElementById('loader');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        });

        async function startRecording() {
            const apiUrl = apiUrlInput.value.trim();
            if (!apiUrl) {
                alert("Iltimos, avval Cloudflare API manzilini kiriting!");
                apiUrlInput.focus();
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendAudioToAPI(audioBlob);
                };

                mediaRecorder.start();
                isRecording = true;
                recordBtn.classList.add('recording');
                statusText.textContent = "Ovoz yozilmoqda... To'xtatish uchun bosing.";
                resultText.textContent = "";
                
            } catch (err) {
                console.error("Mikrofonga ulanishda xato:", err);
                alert("Mikrofonga ruxsat berilmadi yoki xatolik yuz berdi.");
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            isRecording = false;
            recordBtn.classList.remove('recording');
            statusText.textContent = "API ga yuborilmoqda...";
            loader.style.display = "block";
        }

        async function sendAudioToAPI(blob) {
            let apiUrl = apiUrlInput.value.trim();
            // Remove trailing slash if present
            if (apiUrl.endsWith('/')) {
                apiUrl = apiUrl.slice(0, -1);
            }

            const formData = new FormData();
            formData.append("file", blob, "audio_record.webm");

            try {
                const response = await fetch(`${apiUrl}/transcribe/`, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Server xatosi: ${response.status}`);
                }

                const data = await response.json();
                resultText.textContent = data.matn || "Matn topilmadi.";
                statusText.textContent = "Tarjima muvaffaqiyatli yakunlandi.";
            } catch (error) {
                console.error("API xatosi:", error);
                resultText.textContent = `Xatolik: API ga ulanib bo'lmadi. URL manzilni tekshiring va Colab ishlayotganiga ishonch hosil qiling.`;
                statusText.textContent = "Xatolik yuz berdi.";
            } finally {
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
